version: "3.9"

services:
  churn-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: churn_prediction_api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
      - ../configs:/app/configs:ro
      - ../reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
